<div class="night-bg">
  <p-toast position="top-right"></p-toast>
  <div class="glass-card">
    <h2>Login</h2>


    <form class="p-fluid" (ngSubmit)="login()" #form="ngForm">
      <div class="input-wrap">
        <span class="input-icon pi pi-user"></span>
        <input class="glass-input" pInputText id="email"
          [(ngModel)]="email" name="email" placeholder="Email"/>
      </div>

      <div class="input-wrap">
        <span class="input-icon pi pi-lock"></span>
        <input class="glass-input" type="password" id="password"
          [(ngModel)]="password" name="password" placeholder="Contraseña"/>
      </div>

      <button class="btn-main" type="submit" [disabled]="loading">
        {{ loading ? 'Entrando...' : 'Iniciar Sesión' }}
      </button>
      <button class="btn-text" type="button" routerLink="/register">
        ¿No tienes cuenta? <strong>Regístrate</strong>
      </button>
    </form>
  </div>
</div>
