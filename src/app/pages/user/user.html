<app-sidebar></app-sidebar>
<div class="flex justify-content-center align-items-center min-h-screen surface-ground">
  <p-card class="w-full sm:w-30rem shadow-4 border-round-xl">

    <ng-template pTemplate="header">
      <div class="flex flex-column align-items-center p-4">
        <i class="pi pi-user text-6xl mb-3"></i>
        <h2 class="m-0">{{ usuario.nombreCompleto }}</h2>
        <small class="text-color-secondary">@{{ usuario.usuario }}</small>
      </div>
    </ng-template>

    <div class="p-fluid">

      <div class="field mb-3">
        <label class="font-bold">Email</label>
        <div class="p-2 border-round surface-100">
          {{ usuario.email }}
        </div>
      </div>

      <div class="field mb-3">
        <label class="font-bold">Dirección</label>
        <div class="p-2 border-round surface-100">
          {{ usuario.direccion }}
        </div>
      </div>

      <div class="field mb-3">
        <label class="font-bold">Teléfono</label>
        <div class="p-2 border-round surface-100">
          {{ usuario.telefono }}
        </div>
      </div>

      <div class="field mb-3">
        <label class="font-bold">Mayor de edad</label>
        <div class="p-2 border-round surface-100">
          {{ usuario.mayorEdad ? 'Sí' : 'No' }}
        </div>
      </div>

      

    </div>

  </p-card>
</div>
